# Production deploy: every push to main (merge or direct commit). Tests gate
# the apply; terraform re-plans fresh and applies atomically; then the app
# layers deploy (S3+invalidation for the SPA, SSM for the backend).
# The deploy role's trust policy only accepts tokens from refs/heads/main —
# enforced by AWS, not by this file. See docs/ci-cd.md.
name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

# Serialize deploys: a second push queues instead of racing the first apply.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets:
      PLAID_CLIENT_ID: ${{ secrets.PLAID_CLIENT_ID }}
      PLAID_SANDBOX_SECRET: ${{ secrets.PLAID_SANDBOX_SECRET }}

  terraform:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      assets_bucket: ${{ steps.tf_outputs.outputs.assets_bucket }}
      distribution_id: ${{ steps.tf_outputs.outputs.distribution_id }}
      instance_id: ${{ steps.tf_outputs.outputs.instance_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: terraform init
        run: terraform -chdir=terraform init -input=false

      # Plan and apply in one job: the plan is never stale, and if state moved
      # underneath us the lockfile + fresh plan keep it honest.
      - name: terraform plan
        run: terraform -chdir=terraform plan -input=false -out=tfplan

      - name: terraform apply
        run: terraform -chdir=terraform apply -input=false tfplan

      - name: Export outputs for the app deploy
        id: tf_outputs
        run: |
          {
            echo "assets_bucket=$(terraform -chdir=terraform output -raw assets_bucket)"
            echo "distribution_id=$(terraform -chdir=terraform output -raw distribution_id)"
            echo "instance_id=$(terraform -chdir=terraform output -raw instance_id)"
          } >> "$GITHUB_OUTPUT"

  deploy-app:
    needs: terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build frontend
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync SPA to S3
        run: aws s3 sync dist/ "s3://${{ needs.terraform.outputs.assets_bucket }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ needs.terraform.outputs.distribution_id }}" \
            --paths "/*"

      # Backend deploy over SSM: same command as the documented manual deploy
      # (docs/deployment.md), plus a fresh env render in case secrets rotated.
      - name: Deploy backend via SSM
        run: |
          set -euo pipefail
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ needs.terraform.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy ${{ github.sha }}" \
            --parameters '{"commands":["cd /opt/obsidian/app && git pull --ff-only && /usr/local/bin/obsidian-render-env && docker compose -f docker-compose.prod.yaml up -d --build"],"executionTimeout":["1800"]}' \
            --query 'Command.CommandId' --output text)
          echo "SSM command: $COMMAND_ID"

          # Poll up to 30 min — the on-box image build takes a while on t4g.small.
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ needs.terraform.outputs.instance_id }}" \
              --query Status --output text 2>/dev/null || echo Pending)
            case "$STATUS" in
              Success) break ;;
              Cancelled|TimedOut|Failed) break ;;
              *) sleep 10 ;;
            esac
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ needs.terraform.outputs.instance_id }}" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
          [ "$STATUS" = "Success" ]
