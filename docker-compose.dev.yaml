name: obsidian-dev

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    # No command override: the dev stage's default CMD already runs server.ts.
    container_name: obsidian-backend-dev
    env_file: .env.dev
    # .env.dev points the DB/SMTP host at 127.0.0.1 for native `npm run server`
    # (the Supabase CLI binds its ports to loopback only). Inside this container
    # 127.0.0.1 is the container itself, so override just the two host-specific
    # vars to reach the host's published ports via the extra_hosts mapping below.
    # `environment` takes precedence over `env_file`, so the same .env.dev works
    # for both native and containerized runs with no manual swapping.
    environment:
      supabase: "postgresql://postgres:postgres@host.docker.internal:54322/postgres"
      SMTP_HOST: "host.docker.internal"
      # Point the API at the in-cluster Redis so it SUBSCRIBES to the scheduler
      # worker's sync:complete events (and gets distributed rate limiting + the
      # shared cache). Without this the API would only see in-process events and
      # never hear the worker. WORKER_ROLE is left unset so it subscribes.
      REDIS_URL: "redis://redis:6379"
    ports:
      - "3000:3000"
    volumes:
      - ./node:/usr/local/app/node
      - ./package.json:/usr/local/app/package.json
      - ./package-lock.json:/usr/local/app/package-lock.json
      - ./tsconfig.server.json:/usr/local/app/tsconfig.server.json
      - ./tsconfig.app.json:/usr/local/app/tsconfig.app.json
      - ./tsconfig.node.json:/usr/local/app/tsconfig.node.json
      - ./tsconfig.json:/usr/local/app/tsconfig.json
      - backend_node_modules:/usr/local/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # Shared Redis backplane: the scheduler worker PUBLISHes sync:complete here and
  # the backend SUBSCRIBES, so sync notifications reach SSE clients on any API
  # instance. Also backs distributed rate limiting and the cache-aside cache.
  redis:
    image: redis:7-alpine
    container_name: obsidian-redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  # LocalStack: emulates AWS in dev so the audit-export pipeline runs end-to-end
  # without touching real AWS. SERVICES=sqs provisions the SQS API on :4566; the
  # init script (scripts/localstack) creates the audit-export FIFO queue + DLQ on
  # startup. The scheduler worker ships to it via AWS_ENDPOINT_URL. Prod leaves
  # AWS_ENDPOINT_URL unset and hits real AWS with an EC2 instance role.
  localstack:
    image: localstack/localstack:3
    container_name: obsidian-localstack-dev
    environment:
      SERVICES: "sqs,s3,lambda"
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - ./scripts/localstack:/etc/localstack/init/ready.d
      # The audit-archiver Lambda source. The init script zips this dir and
      # deploys it via --zip-file (see scripts/localstack/02-deploy-lambda.sh).
      - ./lambda/audit-archiver:/opt/code/audit-archiver
      # LocalStack runs Lambdas as Docker containers, so it needs the host socket.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # Standalone Plaid sync scheduler (publisher-only). Runs the node-cron job that
  # used to live in the API process, so scaling the API horizontally no longer
  # runs the cron on every instance. Builds from Dockerfile.scheduledsync.dev and
  # runs node/src/worker.ts. WORKER_ROLE=scheduler makes it publish to Redis
  # without opening a subscriber connection.
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    # Same dev image as the backend, but supervises worker.ts instead of server.ts.
    command:
      - "npx"
      - "nodemon"
      - "--watch"
      - "node/src"
      - "--ext"
      - "ts,js,json"
      - "--legacy-watch"
      - "--exec"
      - "tsx"
      - "node/src/worker.ts"
    container_name: obsidian-scheduler-dev
    env_file: .env.dev
    # Same loopback->host override as the backend so the worker reaches the
    # host-published Supabase port from inside the container.
    environment:
      supabase: "postgresql://postgres:postgres@host.docker.internal:54322/postgres"
      REDIS_URL: "redis://redis:6379"
      WORKER_ROLE: "scheduler"
      PORT: "3005"
      # The audit shipper runs on this worker. Point it at LocalStack's SQS; the
      # queue URL uses LocalStack's in-cluster host + fixed account id. Prod
      # leaves AWS_ENDPOINT_URL unset so the SDK hits real AWS via instance role.
      AWS_ENDPOINT_URL: "http://localstack:4566"
      AWS_REGION: "us-east-1"
      SQS_AUDIT_QUEUE_URL: "http://localstack:4566/000000000000/audit-export.fifo"
    ports:
      - "3005:3005"
    volumes:
      - ./node:/usr/local/app/node
      - ./package.json:/usr/local/app/package.json
      - ./package-lock.json:/usr/local/app/package-lock.json
      - ./tsconfig.server.json:/usr/local/app/tsconfig.server.json
      - ./tsconfig.app.json:/usr/local/app/tsconfig.app.json
      - ./tsconfig.node.json:/usr/local/app/tsconfig.node.json
      - ./tsconfig.json:/usr/local/app/tsconfig.json
      - scheduler_node_modules:/usr/local/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:3005/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    # --host 0.0.0.0 so Vite is reachable outside the container (polling via the
    # CHOKIDAR_USEPOLLING env var below).
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    container_name: obsidian-frontend-dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_PROXY_TARGET: "http://backend:3000"
    ports:
      - "5173:5173"
    volumes:
      - ./src:/usr/local/app/src
      - ./public:/usr/local/app/public
      - ./index.html:/usr/local/app/index.html
      - ./vite.config.ts:/usr/local/app/vite.config.ts
      - ./tsconfig.app.json:/usr/local/app/tsconfig.app.json
      - ./tsconfig.node.json:/usr/local/app/tsconfig.node.json
      - ./tsconfig.server.json:/usr/local/app/tsconfig.server.json
      - ./tsconfig.json:/usr/local/app/tsconfig.json
      - ./package.json:/usr/local/app/package.json
      - ./package-lock.json:/usr/local/app/package-lock.json
      - frontend_node_modules:/usr/local/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  # On-demand: `docker compose -f docker-compose.dev.yaml --profile test run --rm test`
  # or use the `npm run test:docker` shortcut. Reuses the backend dev image.
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: obsidian-test
    env_file: .env.test
    # Same host override as the backend service: .env.test uses 127.0.0.1 for
    # native `npm test`; reach the host's published port from the container here.
    environment:
      supabase: "postgresql://postgres:postgres@host.docker.internal:54322/obsidian_test"
    volumes:
      - ./node:/usr/local/app/node
      - ./supabase:/usr/local/app/supabase
      - ./vitest.config.ts:/usr/local/app/vitest.config.ts
      - ./package.json:/usr/local/app/package.json
      - ./package-lock.json:/usr/local/app/package-lock.json
      - ./tsconfig.server.json:/usr/local/app/tsconfig.server.json
      - ./tsconfig.app.json:/usr/local/app/tsconfig.app.json
      - ./tsconfig.node.json:/usr/local/app/tsconfig.node.json
      - ./tsconfig.json:/usr/local/app/tsconfig.json
      - test_node_modules:/usr/local/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["test"]
    command: ["npx", "vitest", "run"]

volumes:
  backend_node_modules:
  frontend_node_modules:
  test_node_modules:
  scheduler_node_modules:
